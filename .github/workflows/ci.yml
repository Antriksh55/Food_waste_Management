name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-auth-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Test auth-service
        run: cd auth-service && mvn clean test -B

  test-food-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Test food-service
        run: cd food-service && mvn clean test -B

  test-claim-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Test claim-service
        run: cd claim-service && mvn clean test -B

  test-notification-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Test notification-service
        run: cd notification-service && mvn clean test -B

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-auth-service, test-food-service, test-claim-service, test-notification-service]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/foodwaste-auth-service:latest
            ghcr.io/${{ github.repository_owner }}/foodwaste-auth-service:${{ github.sha }}

      - name: Build and push food-service
        uses: docker/build-push-action@v5
        with:
          context: ./food-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/foodwaste-food-service:latest
            ghcr.io/${{ github.repository_owner }}/foodwaste-food-service:${{ github.sha }}

      - name: Build and push claim-service
        uses: docker/build-push-action@v5
        with:
          context: ./claim-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/foodwaste-claim-service:latest
            ghcr.io/${{ github.repository_owner }}/foodwaste-claim-service:${{ github.sha }}

      - name: Build and push notification-service
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/foodwaste-notification-service:latest
            ghcr.io/${{ github.repository_owner }}/foodwaste-notification-service:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/foodwaste-frontend:latest
            ghcr.io/${{ github.repository_owner }}/foodwaste-frontend:${{ github.sha }}

  validate-compose:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v3
      - name: Validate docker-compose.yml
        run: docker compose config
