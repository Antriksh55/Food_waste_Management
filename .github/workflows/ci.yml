name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/antriksh55

jobs:
  test-auth-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Test auth-service
        run: cd auth-service && mvn clean test -B

  test-food-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Test food-service
        run: cd food-service && mvn clean test -B

  test-claim-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Test claim-service
        run: cd claim-service && mvn clean test -B

  test-notification-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Test notification-service
        run: cd notification-service && mvn clean test -B

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-auth-service, test-food-service, test-claim-service, test-notification-service]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./auth-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/foodwaste-auth-service:latest
            ${{ env.IMAGE_PREFIX }}/foodwaste-auth-service:${{ github.sha }}

      - name: Build and push food-service
        uses: docker/build-push-action@v6
        with:
          context: ./food-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/foodwaste-food-service:latest
            ${{ env.IMAGE_PREFIX }}/foodwaste-food-service:${{ github.sha }}

      - name: Build and push claim-service
        uses: docker/build-push-action@v6
        with:
          context: ./claim-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/foodwaste-claim-service:latest
            ${{ env.IMAGE_PREFIX }}/foodwaste-claim-service:${{ github.sha }}

      - name: Build and push notification-service
        uses: docker/build-push-action@v6
        with:
          context: ./notification-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/foodwaste-notification-service:latest
            ${{ env.IMAGE_PREFIX }}/foodwaste-notification-service:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/foodwaste-frontend:latest
            ${{ env.IMAGE_PREFIX }}/foodwaste-frontend:${{ github.sha }}

  validate-compose:
    runs-on: ubuntu-latest
    needs: [test-auth-service, test-food-service, test-claim-service, test-notification-service]
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.yml
        run: docker compose config
