server:
  port: 8083

spring:
  application:
    name: claim-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/foodwaste}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:mySecretKeyForFoodWastePlatformThatIsLongEnough}
  expiration: ${JWT_EXPIRATION:86400000}

food:
  service:
    url: ${FOOD_SERVICE_URL:http://food-service:8082}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://notification-service:8084}

logging:
  level:
    com.foodwaste: INFO
